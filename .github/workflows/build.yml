name: CI

on:
  push:
    branches: "*"
    tags: "*"

jobs:
  build:
    strategy:
      matrix:
        include:
          # - os: ubuntu-latest
          #   name: linux
          # - os: macos-latest
          #   name: macos
          - os: windows-latest
            name: windows
            configurePreset: windows-ci
            buildPreset: windows-ci

    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v6

      - uses: ilammy/msvc-dev-cmd@v1
        if: runner.os == 'Windows'
        with:
          arch: x64
      
      - name: Configure
        run: cmake --preset ${{ matrix.configurePreset }}
        env:
          MACOSX_DEPLOYMENT_TARGET: 12.0.0 # temp fix, needed by Qt
      
      - name: Build
        run: cmake --build --preset ${{ matrix.buildPreset }}

      - name: Package
        run: cmake --build --preset ${{ matrix.buildPreset }} --target package

      - name: Upload artifact
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: ClapWorkbenchSDK-${{ matrix.name }}
          path: "build/*.tar.gz"
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: "build/*.tar.gz"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
